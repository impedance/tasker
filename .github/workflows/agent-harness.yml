name: agent-harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  harness:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [smoke, preflight]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        if: hashFiles('package.json', 'package-lock.json', 'pnpm-lock.yaml', 'yarn.lock') != ''
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        if: hashFiles('pyproject.toml', 'requirements.txt', 'requirements-dev.txt', 'requirements-test.txt', 'poetry.lock', 'pdm.lock', 'uv.lock') != ''
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version-file: go.mod

      - name: Install dependencies (best-effort)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            if [ -f pnpm-lock.yaml ]; then
              corepack enable
              pnpm install --frozen-lockfile
            elif [ -f yarn.lock ]; then
              corepack enable
              yarn install --frozen-lockfile
            elif [ -f package-lock.json ]; then
              npm ci
            else
              echo "No Node lockfile found; skipping install."
            fi
          fi

          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          fi
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          fi
          if [ -f requirements-test.txt ]; then
            python -m pip install -r requirements-test.txt
          fi

          if [ -f go.mod ]; then
            go mod download
          fi

      - name: Run harness target
        run: make ${{ matrix.target }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: ignore
